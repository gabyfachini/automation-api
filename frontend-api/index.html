<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Automation API Platform</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#1f2937,#4b5563);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.container{
    background:white;
    width:500px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    margin-top:0;
    font-size:24px;
    text-align:center;
}

label{
    font-weight:bold;
    display:block;
    margin-top:15px;
}

select,input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.response{
    margin-top:20px;
}

pre{
    background:#111827;
    color:#10b981;
    padding:15px;
    border-radius:6px;
    overflow:auto;
}

.hidden{
    display:none;
}

.footer{
    text-align:center;
    margin-top:15px;
    font-size:12px;
    color:#777;
}

</style>
</head>

<body>

<div class="container">

<h1>Automation API Platform</h1>

<label>Ação</label>

<select id="action" onchange="toggleCpf()">
<option value="password-generator">Password Generator</option>
<option value="fake-data">Fake Data</option>
<option value="motivational-quotes">Motivational Quote</option>
<option value="cpf-validator">CPF Validator</option>
</select>

<div id="cpfField" class="hidden">

<label>CPF</label>
<input id="cpf" type="text" placeholder="Digite o CPF">

</div>

<button onclick="sendRequest()">Enviar Request</button>

<div class="response">

<h3>Resposta da API</h3>

<pre id="response">
A resposta aparecerá aqui
</pre>

</div>

<div class="footer">
Automation API Test Interface
</div>

</div>

<script>

const API_URL = "http://localhost:5678/webhook-test/api"; //Remeber to change this URL if your backend is running on a different address or port

function toggleCpf(){

    const action = document.getElementById("action").value;
    const cpfField = document.getElementById("cpfField");

    if(action === "cpf-validator"){
        cpfField.classList.remove("hidden");
    }else{
        cpfField.classList.add("hidden");
    }

}

async function sendRequest(){

    const action = document.getElementById("action").value;
    const cpf = document.getElementById("cpf").value;

    let body = { action: action };

    if(action === "cpf-validator"){
        body.cpf = cpf;
    }

    try{

        const response = await fetch(API_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(body)
        });

        const data = await response.json();

        document.getElementById("response").textContent =
            JSON.stringify(data,null,2);

    }catch(error){

        document.getElementById("response").textContent =
            "Erro ao conectar com a API.";

    }

}

</script>

</body>
</html>
